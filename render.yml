services:
  - type: web
    name: link4m-key-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LINK4M_API_TOKEN
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: SESSION_TTL_MINUTES
        value: 30
